{% set name = "django-fsm-log" %}
{% set version = "5.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 5276a587bff3112c123c73456f37decf9c1bdc631e005c760e248adc25c8ec97

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - django-fsm-2
    - python >={{ python_min }},<3.11
    - django >=4.2
    - django-fsm >=2
    - django-appconf

test:
  imports:
    - django_fsm_log
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/gizmag/django-fsm-log
  summary: Logging for django-fsm
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - cshaley
